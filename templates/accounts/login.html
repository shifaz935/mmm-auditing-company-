<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MMM AuditFlow | Login</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    >

    <style>
        body {
            background-color: #f5f5f5;
        }

        .login-box {
            margin-top: 100px;
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        .mmm-title {
            color: #7a1f2b; /* MMM maroon */
            font-weight: bold;
        }

        .mmm-btn {
            background-color: #7a1f2b;
            color: white;
        }

        .mmm-btn:hover {
            background-color: #5e1620;
            color: white;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-4 login-box">

            <h4 class="text-center mmm-title mb-3">
                MMM AuditFlow
            </h4>

            <p class="text-center text-muted mb-4">
                Mariam Mohammed Almalek – Accounting & Auditing Office
            </p>

            <!-- LOGIN FORM -->
            <form method="post">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input
                        type="text"
                        name="username"
                        class="form-control"
                        placeholder="Enter username"
                        required
                    >
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input
                        type="password"
                        name="password"
                        class="form-control"
                        placeholder="Enter password"
                        required
                    >
                </div>

                {% if error %}
                    <div class="alert alert-danger">
                        {{ error }}
                    </div>
                {% endif %}

                <button type="submit" class="btn mmm-btn w-100">
                    Login
                </button>
            </form>

        </div>
    </div>
</div>

</body>
</html>
