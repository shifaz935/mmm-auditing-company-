{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MMM AuditFlow</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    >

    <style>
        body {
            background-color: #f5f5f5;
        }

        /* MMM Brand Colors */
        .mmm-header {
            background-color: #7a1f2b; /* Maroon */
            color: white;
        }

        .mmm-sidebar {
            background-color: #2f2f2f; /* Dark gray */
            min-height: 100vh;
        }

        .mmm-sidebar a {
            color: white;
            text-decoration: none;
            display: block;
            padding: 12px;
        }

        .mmm-sidebar a:hover {
            background-color: #7a1f2b;
        }

        .content-area {
            padding: 20px;
        }

        body.mmm-bg {
            background-image: url("{% static 'images/mmm-logo.png' %}");
            background-repeat: no-repeat;
            background-position: center center;
            background-size: 400px;   /* logo size */
            background-attachment: fixed;
            background-color: #f8f9fa; /* light background */
        }

        /* Make logo look like watermark */
        body.mmm-bg::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("{% static 'images/mmm-logo.png' %}");
            background-repeat: no-repeat;
            background-position: center;
            background-size: 420px;
            opacity: 0.05;   /* VERY IMPORTANT */
            z-index: -1;
        }
    </style>
</head>
<body class="mmm-bg">

<!-- HEADER -->
<nav class="navbar mmm-header px-3">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h5 text-white">
            Mariam Mohammed Almalek – Accounting & Auditing Office
        </span>

        <a href="{% url 'accounts:logout' %}" class="btn btn-light btn-sm">
          Logout
        </a>

    </div>
</nav>

<!-- MAIN LAYOUT -->
<div class="container-fluid">
    <div class="row">

        <!-- SIDEBAR -->
        <div class="col-md-2 mmm-sidebar">
            <h6 class="text-center mt-3 text-white">MMM AuditFlow</h6>
            <hr class="text-white">
        {% if user.is_authenticated %}

           <a href="{% url 'dashboard:dashboard' %}">Dashboard</a>
           <a href="{% url 'clients:client_list' %}">Clients</a>
           <a href="{% url 'documents:document_list' %}">Documents</a>
        {% endif %}
        </div>

        <!-- CONTENT -->
        <div class="col-md-10 content-area">
            {% block content %}
            <!-- Page content will appear here -->
            {% endblock %}
        </div>

    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
